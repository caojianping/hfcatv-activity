<nz-layout class="login-layout">
    <div nz-row nzType="flex" nzJustify="center" nzAlign="middle">
        <div nz-col [nzXs]="{span: 20}" [nzSm]="{span:16}" [nzMd]="{span:12}"
             [nzLg]="{span:10}" [nzXl]="{span:8}" [nzXXl]="{span:6}">

            <div class="login">
                <h1 class="login-title">某某公司测试CMS系统</h1>
                <form nz-form [formGroup]="loginForm" class="login-form" (ngSubmit)="login(loginForm.value)">
                    <nz-form-item>
                        <nz-form-control nzErrorTip="Please input your username!">
                            <nz-input-group nzPrefixIcon="user">
                                <input type="text" nz-input formControlName="username" placeholder="Username"/>
                            </nz-input-group>
                        </nz-form-control>
                    </nz-form-item>
                    <nz-form-item>
                        <nz-form-control nzErrorTip="Please input your Password!">
                            <nz-input-group nzPrefixIcon="lock">
                                <input type="password" nz-input formControlName="password" placeholder="Password"/>
                            </nz-input-group>
                        </nz-form-control>
                    </nz-form-item>
                    <nz-form-item>
                        <nz-form-control>
                            <label nz-checkbox formControlName="remember">
                                <span>Remember me</span>
                            </label>
                            <a class="login-form-forgot" class="login-form-forgot">Forgot password</a>
                            <button nz-button class="login-form-button" [nzType]="'primary'">Log in</button>
                            Or
                            <a>register now!</a>
                        </nz-form-control>
                    </nz-form-item>
                </form>
            </div>

        </div>
    </div>
</nz-layout>
