export default "<app-layout>\r\n    <form class=\"manager-form\" nz-form [formGroup]=\"managerForm\"\r\n          (ngSubmit)=\"modifyPassword(managerForm.value)\">\r\n\r\n        <nz-form-item>\r\n            <nz-form-control nzErrorTip=\"请输入新密码\">\r\n                <nz-input-group nzPrefixIcon=\"lock\">\r\n                    <input type=\"password\" nz-input formControlName=\"password\"\r\n                           placeholder=\"请输入新密码\"/>\r\n                </nz-input-group>\r\n            </nz-form-control>\r\n        </nz-form-item>\r\n\r\n        <nz-form-item>\r\n            <nz-form-control nzErrorTip=\"请输入确认密码\">\r\n                <nz-input-group nzPrefixIcon=\"lock\">\r\n                    <input type=\"password\" nz-input formControlName=\"confirmPassword\"\r\n                           placeholder=\"请输入确认密码\"/>\r\n                </nz-input-group>\r\n            </nz-form-control>\r\n        </nz-form-item>\r\n\r\n        <nz-form-item>\r\n            <button class=\"btn-modify\" nz-button nzType=\"primary\" nzSize=\"large\">修改密码</button>\r\n        </nz-form-item>\r\n    </form>\r\n</app-layout>\r\n"
