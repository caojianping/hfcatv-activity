export default "<nz-layout>\r\n    <div nz-row nzType=\"flex\" nzJustify=\"center\" nzAlign=\"middle\">\r\n        <div nz-col [nzXs]=\"20\" [nzSm]=\"16\" [nzMd]=\"12\" [nzLg]=\"10\" [nzXl]=\"8\" [nzXXl]=\"6\">\r\n\r\n            <div class=\"login-main\">\r\n                <h1 class=\"login-title\">合肥有线抽奖活动CMS系统</h1>\r\n                <form nz-form class=\"login-form\" [formGroup]=\"loginForm\"\r\n                      (ngSubmit)=\"login(loginForm.value)\">\r\n                    <nz-form-item>\r\n                        <nz-form-control nzErrorTip=\"请输入管理员账号\">\r\n                            <nz-input-group nzPrefixIcon=\"user\">\r\n                                <input type=\"text\" nz-input formControlName=\"username\"\r\n                                       placeholder=\"管理员账号\"/>\r\n                            </nz-input-group>\r\n                        </nz-form-control>\r\n                    </nz-form-item>\r\n\r\n                    <nz-form-item>\r\n                        <nz-form-control nzErrorTip=\"请输入管理员密码\">\r\n                            <nz-input-group nzPrefixIcon=\"lock\">\r\n                                <input type=\"password\" nz-input formControlName=\"password\"\r\n                                       placeholder=\"请输入管理员密码\"/>\r\n                            </nz-input-group>\r\n                        </nz-form-control>\r\n                    </nz-form-item>\r\n\r\n                    <nz-form-item>\r\n                        <nz-form-control>\r\n                            <label nz-checkbox formControlName=\"remember\">\r\n                                <span>记住我</span>\r\n                            </label>\r\n                            <button class=\"btn-login\" nz-button nzType=\"primary\">登录</button>\r\n                        </nz-form-control>\r\n                    </nz-form-item>\r\n                </form>\r\n            </div>\r\n\r\n        </div>\r\n    </div>\r\n</nz-layout>\r\n"
